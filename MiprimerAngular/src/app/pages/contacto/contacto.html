<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario</title>
</head>
<body>

  <h1>Tarea Formulario</h1>

  <form>
    <label for="nombre">Nombre Completo:</label>
    <input type="text" id="nombre" name="nombre" required>
    <br><br>

    <label for="identificacion">Número de Identificación:</label>
    <input type="number" id="identificacion" name="identificacion" required>
    <br><br>

    <label for="fechaNacimiento">Fecha de Nacimiento:</label>
    <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
    <br><br>

    <p>Estado Civil:</p>
    <input type="checkbox" id="soltero" name="estadoCivil" value="Soltero">
    <label for="soltero">Solter@</label>

    <input type="checkbox" id="casado" name="estadoCivil" value="Casado">
    <label for="casado">Casad@</label>
    <br><br>

    <input type="checkbox" id="politica" name="politica" required>
    <label for="politica">Acepto la política de tratamiento de datos</label>
    <br><br>

    <button type="submit">Enviar</button>
  </form>

</body>
</html>
